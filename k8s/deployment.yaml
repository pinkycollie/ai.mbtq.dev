apiVersion: apps/v1
kind: Deployment
metadata:
  name: mbtq-ai-platform
  labels:
    app: mbtq-ai-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mbtq-ai-platform
  template:
    metadata:
      labels:
        app: mbtq-ai-platform
    spec:
      containers:
      - name: mbtq-ai-platform
        image: mbtq-ai-platform:latest
        ports:
        - containerPort: 3000
        # Required environment variables:
        # - NODE_ENV: Application environment (e.g., "production", "development")
        # - PORT: Port the application listens on
        # - DATABASE_URL: Database connection string (secret)
        # - API_KEY: External service API key (secret)
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: mbtq-ai-platform-config
              key: NODE_ENV
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: mbtq-ai-platform-config
              key: PORT
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: mbtq-ai-platform-secrets
              key: DATABASE_URL
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: mbtq-ai-platform-secrets
              key: API_KEY
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mbtq-ai-platform-service
spec:
  selector:
    app: mbtq-ai-platform
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mbtq-ai-platform-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mbtq-ai-platform
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
