version: '3.8'
services:
  mbtq-app:
    build: .
    container_name: mbtq-node
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://postgres:password@postgres:5432/mbtq_ai_platform
      - JWT_SECRET=zero-trust-mbtq-secret
    env_file: [.env.local]
    volumes: [./data:/app/data, ./logs:/app/logs]
    restart: unless-stopped
    depends_on: [postgres]
    networks: [mbtq-net]
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/_health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  postgres:
    image: postgres:15-alpine
    container_name: mbtq-db
    ports: ["5432:5432"]
    environment: [POSTGRES_DB=mbtq_ai_platform, POSTGRES_USER=postgres, POSTGRES_PASSWORD=password]
    volumes: [postgres_data:/var/lib/postgresql/data, ./database:/docker-entrypoint-initdb.d]
    restart: unless-stopped
    networks: [mbtq-net]
networks: { mbtq-net: { driver: bridge } }
volumes: { postgres_data: }
